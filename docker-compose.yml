services:
  redis:
    image: redis:alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    restart: unless-stopped

  minio:
    image: minio/minio
    ports:
      # Port 9000 (MinIO API) KHÔNG expose ra host — mọi request từ browser đều đi qua Kong (/storage).
      # Điều này ngăn client biết/gọi trực tiếp MinIO endpoint.
      # Chỉ giữ 9001 cho MinIO Console (dashboard quản trị) dùng ở dev.
      # Trên production, nên bỏ luôn 9001 hoặc giới hạn IP truy cập.
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

  minio-setup:
    image: minio/mc
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}); do
        echo 'Waiting for MinIO to start...';
        sleep 2;
      done;
      /usr/bin/mc mb myminio/securelearn-media --ignore-existing;
      /usr/bin/mc anonymous set none myminio/securelearn-media;
      echo 'MinIO setup complete.';
      exit 0;
      "

  api-gateway:
    image: kong:latest
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 127.0.0.1:8001
    ports:
      - "8000:8000"
    volumes:
      - ./backend/api-gateway/kong.yml:/etc/kong/kong.yml
    depends_on:
      - identity-service
      - course-service
      - payment-service
      - media-service
      - progress-service
      - notification-service
      - inbox-service
    restart: unless-stopped

  identity-service:
    build:
      context: ./backend
      dockerfile: identity-service/Dockerfile
    environment:
      PORT: 5001
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI_IDENTITY}
      REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      REFRESH_TOKEN: ${REFRESH_TOKEN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:8000/api/auth/google/callback}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      OTP_SECRET: ${OTP_SECRET:-}
      IDENTITY_GRPC_BIND: ${IDENTITY_GRPC_BIND:-0.0.0.0:6001}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped

  course-service:
    build:
      context: ./backend
      dockerfile: course-service/Dockerfile
    environment:
      PORT: 5002
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI_COURSE}
      REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      COURSE_GRPC_BIND: ${COURSE_GRPC_BIND:-0.0.0.0:6002}
      MEDIA_GRPC_TARGET: ${MEDIA_GRPC_TARGET:-media-service:6003}
      PAYMENT_GRPC_TARGET: ${PAYMENT_GRPC_TARGET:-payment-service:6004}
      IDENTITY_GRPC_TARGET: ${IDENTITY_GRPC_TARGET:-identity-service:6001}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    depends_on:
      - redis
      - rabbitmq
      - identity-service
    restart: unless-stopped

  progress-service:
    build:
      context: ./backend
      dockerfile: progress-service/Dockerfile
    environment:
      PORT: 5005
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI_PROGRESS}
      REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      COURSE_GRPC_TARGET: ${COURSE_GRPC_TARGET:-course-service:6002}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
    depends_on:
      - redis
      - rabbitmq
      - course-service
    restart: unless-stopped

  payment-service:
    build:
      context: ./backend
      dockerfile: payment-service/Dockerfile
    environment:
      PORT: 5004
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI_PAYMENT}
      REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      COURSE_SERVICE_URL: ${COURSE_SERVICE_URL:-http://course-service:5002}
      PAYMENT_GRPC_BIND: ${PAYMENT_GRPC_BIND:-0.0.0.0:6004}
      VNPAY_URL: ${VNPAY_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:-}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET:-}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL:-http://localhost:5173/payment/vnpay-return}
      VNPAY_IPN_URL: ${VNPAY_IPN_URL:-http://localhost:8000/api/payments/webhooks/vnpay}
      VNPAY_LOCALE: ${VNPAY_LOCALE:-vn}
      VNPAY_CURRENCY: ${VNPAY_CURRENCY:-VND}
      VNPAY_ORDER_TYPE: ${VNPAY_ORDER_TYPE:-190002}
      VNPAY_EXPIRE_MINUTES: ${VNPAY_EXPIRE_MINUTES:-15}
      MOMO_API_URL: ${MOMO_API_URL:-https://test-payment.momo.vn/v2/gateway/api/create}
      MOMO_QUERY_URL: ${MOMO_QUERY_URL:-https://test-payment.momo.vn/v2/gateway/api/query}
      MOMO_REQUEST_TYPE: ${MOMO_REQUEST_TYPE:-payWithMethod}
      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE:-}
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY:-}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY:-}
      MOMO_RETURN_URL: ${MOMO_RETURN_URL:-http://localhost:5173/payment/momo-return}
      MOMO_IPN_URL: ${MOMO_IPN_URL:-http://localhost:8000/api/payments/webhooks/momo}
      MOMO_LANG: ${MOMO_LANG:-vi}
      MOMO_AUTO_CAPTURE: ${MOMO_AUTO_CAPTURE:-true}
      MOMO_ORDER_EXPIRE_TIME: ${MOMO_ORDER_EXPIRE_TIME:-30}
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped

  media-service:
    build:
      context: ./backend
      dockerfile: media-service/Dockerfile
    environment:
      PORT: 5003
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI_MEDIA}
      REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379
      PLAYBACK_SEGMENT_SECRET: ${ACCESS_TOKEN}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      MEDIA_GRPC_BIND: ${MEDIA_GRPC_BIND:-0.0.0.0:6003}
      COURSE_GRPC_TARGET: ${COURSE_GRPC_TARGET:-course-service:6002}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-securelearn-media}
      S3_PUBLIC_DOMAIN: ${S3_PUBLIC_DOMAIN:-}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      API_URL: ${API_URL:-http://localhost:8000}
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped

  notification-service:
    build:
      context: ./backend
      dockerfile: notification-service/Dockerfile
    environment:
      PORT: 5006
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI_NOTIFICATION}
      REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      IDENTITY_GRPC_TARGET: ${IDENTITY_GRPC_TARGET:-identity-service:6001}
      COURSE_GRPC_TARGET: ${COURSE_GRPC_TARGET:-course-service:6002}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN:-http://localhost:5173}
      RABBITMQ_RETRY_LIMIT: ${RABBITMQ_RETRY_LIMIT:-3}
      EMAIL_RETRY_LIMIT: ${EMAIL_RETRY_LIMIT:-3}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${SMTP_FROM:-}
    depends_on:
      - redis
      - rabbitmq
      - identity-service
      - course-service
    restart: unless-stopped

  inbox-service:
    build:
      context: ./backend
      dockerfile: inbox-service/Dockerfile
    environment:
      PORT: 5007
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI_INBOX}
      REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      IDENTITY_GRPC_TARGET: ${IDENTITY_GRPC_TARGET:-identity-service:6001}
      COURSE_GRPC_TARGET: ${COURSE_GRPC_TARGET:-course-service:6002}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN:-http://localhost:5173}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-securelearn-media}
    depends_on:
      - redis
      - rabbitmq
      - minio
      - identity-service
      - course-service
    restart: unless-stopped
volumes:
  minio-data:


