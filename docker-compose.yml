services:
  redis:
    image: redis:7.4.2-alpine3.21
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.0.7-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    restart: unless-stopped


  kong-config-renderer:
    image: hairyhenderson/gomplate:v4.3.0-alpine
    command: ["-f", "/template/kong.yml", "-o", "/generated/kong.yml"]
    environment:
      KONG_JWT_SECRET: ${ACCESS_TOKEN}
    volumes:
      - ./backend/api-gateway/kong.yml:/template/kong.yml:ro
      - kong-config:/generated
    restart: "no"

  api-gateway:
    image: kong:3.9.1
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 127.0.0.1:8001
    ports:
      - "8000:8000"
    volumes:
      - kong-config:/etc/kong
    depends_on:
      kong-config-renderer: { condition: service_completed_successfully }
      identity-service: { condition: service_started }
      course-service: { condition: service_started }
      content-service: { condition: service_started }
      payment-service: { condition: service_started }
      media-service: { condition: service_started }
      progress-service: { condition: service_started }
      notification-service: { condition: service_started }
      inbox-service: { condition: service_started }
    restart: unless-stopped

  identity-service:
    build:
      context: ./backend
      dockerfile: identity-service/Dockerfile
    environment:
      PORT: 5001
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI_IDENTITY}
      REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      REFRESH_TOKEN: ${REFRESH_TOKEN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:8000/api/auth/google/callback}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      OTP_SECRET: ${OTP_SECRET:-}
      IDENTITY_GRPC_BIND: ${IDENTITY_GRPC_BIND:-0.0.0.0:6001}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped

  course-service:
    build:
      context: ./backend
      dockerfile: course-service/Dockerfile
    environment:
      PORT: 5002
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI_COURSE}
      REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN:-http://localhost:5173}
      COURSE_GRPC_BIND: ${COURSE_GRPC_BIND:-0.0.0.0:6002}
      MEDIA_GRPC_TARGET: ${MEDIA_GRPC_TARGET:-media-service:6003}
      PAYMENT_GRPC_TARGET: ${PAYMENT_GRPC_TARGET:-payment-service:6004}
      IDENTITY_GRPC_TARGET: ${IDENTITY_GRPC_TARGET:-identity-service:6001}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    depends_on:
      - redis
      - rabbitmq
      - identity-service
    restart: unless-stopped

  content-service:
    build:
      context: ./backend
      dockerfile: content-service/Dockerfile
    environment:
      PORT: 5008
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI_CONTENT}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    restart: unless-stopped
  progress-service:
    build:
      context: ./backend
      dockerfile: progress-service/Dockerfile
    environment:
      PORT: 5005
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI_PROGRESS}
      REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      COURSE_GRPC_TARGET: ${COURSE_GRPC_TARGET:-course-service:6002}
      PAYMENT_GRPC_TARGET: ${PAYMENT_GRPC_TARGET:-payment-service:6004}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
    depends_on:
      - redis
      - rabbitmq
      - course-service
    restart: unless-stopped

  payment-service:
    build:
      context: ./backend
      dockerfile: payment-service/Dockerfile
    environment:
      PORT: 5004
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI_PAYMENT}
      REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      COURSE_SERVICE_URL: ${COURSE_SERVICE_URL:-http://course-service:5002}
      PAYMENT_GRPC_BIND: ${PAYMENT_GRPC_BIND:-0.0.0.0:6004}
      VNPAY_URL: ${VNPAY_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:-}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET:-}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL:-http://localhost:5173/payment/vnpay-return}
      VNPAY_IPN_URL: ${VNPAY_IPN_URL:-http://localhost:8000/api/payments/webhooks/vnpay}
      VNPAY_LOCALE: ${VNPAY_LOCALE:-vn}
      VNPAY_CURRENCY: ${VNPAY_CURRENCY:-VND}
      VNPAY_ORDER_TYPE: ${VNPAY_ORDER_TYPE:-190002}
      VNPAY_EXPIRE_MINUTES: ${VNPAY_EXPIRE_MINUTES:-15}
      MOMO_API_URL: ${MOMO_API_URL:-https://test-payment.momo.vn/v2/gateway/api/create}
      MOMO_QUERY_URL: ${MOMO_QUERY_URL:-https://test-payment.momo.vn/v2/gateway/api/query}
      MOMO_REQUEST_TYPE: ${MOMO_REQUEST_TYPE:-payWithMethod}
      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE:-}
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY:-}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY:-}
      MOMO_RETURN_URL: ${MOMO_RETURN_URL:-http://localhost:5173/payment/momo-return}
      MOMO_IPN_URL: ${MOMO_IPN_URL:-http://localhost:8000/api/payments/webhooks/momo}
      MOMO_LANG: ${MOMO_LANG:-vi}
      MOMO_AUTO_CAPTURE: ${MOMO_AUTO_CAPTURE:-true}
      MOMO_ORDER_EXPIRE_TIME: ${MOMO_ORDER_EXPIRE_TIME:-30}
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped

  media-service:
    build:
      context: ./backend
      dockerfile: media-service/Dockerfile
    environment:
      PORT: 5003
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI_MEDIA}
      REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379
      PLAYBACK_SEGMENT_SECRET: ${ACCESS_TOKEN}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      MEDIA_GRPC_BIND: ${MEDIA_GRPC_BIND:-0.0.0.0:6003}
      COURSE_GRPC_TARGET: ${COURSE_GRPC_TARGET:-course-service:6002}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-securelearn-media}
      S3_PUBLIC_DOMAIN: ${S3_PUBLIC_DOMAIN:-}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      API_URL: ${API_URL:-http://localhost:8000}
      FFMPEG_THREADS: ${FFMPEG_THREADS:-2}
      VIDEO_ENCODE_CONCURRENCY: ${VIDEO_ENCODE_CONCURRENCY:-2}
      VIDEO_QUEUE_POLL_INTERVAL_MS: ${VIDEO_QUEUE_POLL_INTERVAL_MS:-2000}
    depends_on:
      - redis
      - rabbitmq
    mem_limit: 2g
    cpus: 4.0
    restart: unless-stopped

  notification-service:
    build:
      context: ./backend
      dockerfile: notification-service/Dockerfile
    environment:
      PORT: 5006
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI_NOTIFICATION}
      REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      IDENTITY_GRPC_TARGET: ${IDENTITY_GRPC_TARGET:-identity-service:6001}
      COURSE_GRPC_TARGET: ${COURSE_GRPC_TARGET:-course-service:6002}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN:-http://localhost:5173}
      RABBITMQ_RETRY_LIMIT: ${RABBITMQ_RETRY_LIMIT:-3}
      EMAIL_RETRY_LIMIT: ${EMAIL_RETRY_LIMIT:-3}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${SMTP_FROM:-}
    depends_on:
      - redis
      - rabbitmq
      - identity-service
      - course-service
    restart: unless-stopped

  inbox-service:
    build:
      context: ./backend
      dockerfile: inbox-service/Dockerfile
    environment:
      PORT: 5007
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI_INBOX}
      REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      IDENTITY_GRPC_TARGET: ${IDENTITY_GRPC_TARGET:-identity-service:6001}
      COURSE_GRPC_TARGET: ${COURSE_GRPC_TARGET:-course-service:6002}
      COURSE_SERVICE_URL: ${COURSE_SERVICE_URL:-http://course-service:5002}
      CONTENT_SERVICE_URL: ${CONTENT_SERVICE_URL:-http://content-service:5008}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      CHATBOT_GUEST_TOKEN_SECRET: ${CHATBOT_GUEST_TOKEN_SECRET:-}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN:-http://localhost:5173}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-securelearn-media}
    depends_on:
      - redis
      - rabbitmq
      - identity-service
      - course-service
    restart: unless-stopped
# volume minio-data đã được xóa bỏ do sử dụng R2 Cloud

volumes:
  kong-config:

