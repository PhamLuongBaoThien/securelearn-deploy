{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels: { app.kubernetes.io/name: frontend, app.kubernetes.io/part-of: securelearn }
spec:
  replicas: {{ .Values.frontend.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector:
    matchLabels: { app.kubernetes.io/name: frontend }
  template:
    metadata:
      labels: { app.kubernetes.io/name: frontend, app.kubernetes.io/part-of: securelearn }
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.image.registry }}/{{ .Values.frontend.image }}:{{ default .Values.image.tag .Values.frontend.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - { name: API_BASE_URL, value: {{ .Values.frontend.apiBaseUrl | quote }} }
          ports:
            - { name: http, containerPort: 8080 }
          readinessProbe: { httpGet: { path: /health/live, port: http }, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: /health/live, port: http }, periodSeconds: 20 }
          resources: {{ toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata: { name: frontend }
spec:
  selector: { app.kubernetes.io/name: frontend }
  ports:
    - { name: http, port: 8080, targetPort: http }
{{- end }}
