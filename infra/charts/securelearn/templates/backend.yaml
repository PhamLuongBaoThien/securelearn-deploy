{{- range $name, $service := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "securelearn.labels" $ | nindent 4 }}
spec:
  replicas: {{ $.Values.backend.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector:
    matchLabels: { app.kubernetes.io/name: {{ $name }} }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/part-of: securelearn
    spec:
      terminationGracePeriodSeconds: {{ $.Values.backend.terminationGracePeriodSeconds }}
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.image.registry }}/{{ $name }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - { name: http, containerPort: {{ $service.port }} }
            {{- if $service.grpcPort }}
            - { name: grpc, containerPort: {{ $service.grpcPort }} }
            {{- end }}
          envFrom:
            - configMapRef: { name: {{ include "securelearn.fullname" $ }}-config }
            - secretRef: { name: {{ $.Values.existingSecret }} }
          env:
            - { name: PORT, value: {{ $service.port | quote }} }
            {{- if $service.grpcPort }}
            - { name: {{ $service.grpcBindEnv }}, value: "0.0.0.0:{{ $service.grpcPort }}" }
            {{- end }}
            - name: MONGO_URI
              valueFrom:
                secretKeyRef: { name: {{ $.Values.existingSecret }}, key: {{ printf "MONGO_URI_%s" ($name | trimSuffix "-service" | upper) }} }
          startupProbe:
            httpGet: { path: /health/ready, port: http }
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet: { path: /health/ready, port: http }
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /health/live, port: http }
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources: {{ toYaml ($service.resources | default $.Values.backend.resources) | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels: { app.kubernetes.io/name: {{ $name }} }
spec:
  type: ClusterIP
  selector: { app.kubernetes.io/name: {{ $name }} }
  ports:
    - { name: http, port: {{ $service.port }}, targetPort: http }
    {{- if $service.grpcPort }}
    - { name: grpc, port: {{ $service.grpcPort }}, targetPort: grpc }
    {{- end }}
{{- end }}
